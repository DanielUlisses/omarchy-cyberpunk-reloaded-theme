# Cyberpunk Dreams Theme for Spotify Player
# By: deathko
# Inspired by Cyberpunk 2077 aesthetics with neon yellow, cyan, and teal

[theme]
name = "cyberpunk-dreams"
description = "Custom theme inspired by Cyberpunk 2077 aesthetics"

# Main colors
background = "#00060e"          # Deep black (main background)
foreground = "#d8eef8"          # Light cyan-white (primary text)
accent = "#fee801"              # Neon yellow (primary accent)
secondary = "#54c1e6"           # Cyan (secondary accent)
tertiary = "#9a9f17"            # Olive (soft accent)
highlight = "#fee801"           # Neon yellow (bright accent)
teal = "#39c4b6"                # Teal (green-blue accent)

# Text colors with high contrast
text_primary = "#d8eef8"        # Light cyan-white
text_secondary = "#9a9f17"      # Olive for metadata
text_muted = "#54c1e6"          # Cyan for less important info
text_accent = "#fee801"         # Neon yellow for highlights

# Status colors
status_playing = "#39c4b6"      # Teal for playing status
status_paused = "#9a9f17"       # Olive for paused status
status_stopped = "#54c1e6"      # Cyan for stopped status

# Progress bar colors
progress_filled = "#54c1e6"     # Cyan for filled progress
progress_empty = "#071520"      # Dark for empty progress
progress_cursor = "#fee801"     # Neon yellow for progress cursor

# Selection colors
selection_background = "#fee801" # Neon yellow background for selection
selection_foreground = "#00060e" # Dark text on selection
hover_background = "#071520"    # Dark for hover
hover_foreground = "#d8eef8"    # Light text on hover

# Border colors
border_active = "#fee801"       # Neon yellow for active borders
border_inactive = "#9a9f17"     # Olive for inactive borders
border_focus = "#54c1e6"        # Cyan for focus borders

# Metadata colors
metadata_repeat = "#9a9f17"     # Olive
metadata_shuffle = "#9a9f17"    # Olive
metadata_volume = "#9a9f17"     # Olive
metadata_device = "#9a9f17"     # Olive
metadata_genre = "#39c4b6"      # Teal

# Table colors
table_header = "#54c1e6"        # Cyan for table headers
table_row_even = "#00060e"      # Dark background for even rows
table_row_odd = "#071520"       # Slightly lighter for odd rows
table_selected = "#fee801"      # Neon yellow for selected row

# Popup colors
popup_background = "#00060e"    # Dark background
popup_border = "#fee801"        # Neon yellow border
popup_title = "#d8eef8"         # Light title
popup_text = "#9a9f17"          # Olive text

# Error and warning colors
error = "#fee801"               # Neon yellow for errors
warning = "#9a9f17"             # Olive for warnings
success = "#39c4b6"             # Teal for success
info = "#54c1e6"                # Cyan for info
